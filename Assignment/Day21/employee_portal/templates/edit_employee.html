<h2>Edit Employee</h2>

<form method="POST">

Name:
<input type="text" name="name" value="{{ emp.name }}">
<br><br>

Email:
<input type="text" name="email" value="{{ emp.email }}">
<br><br>

Department:
<input type="text" name="department" value="{{ emp.department }}">
<br><br>

<button type="submit">Update</button>

</form>
